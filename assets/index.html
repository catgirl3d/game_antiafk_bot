<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-AFK Bot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="title-bar" id="titleBar">
        <img src="icon.png" class="app-icon" alt="">
        <div class="title-drag pywebview-drag-region">Anti-AFK Bot</div>
        <div class="title-controls">
            <button class="win-btn" id="minBtn" title="Minimize">
                <svg width="12" height="12" viewBox="0 0 12 12"><rect fill="currentColor" x="2" y="5.5" width="8" height="1"/></svg>
            </button>
            <button class="win-btn btn-close" id="closeBtn" title="Close">
                <svg width="12" height="12" viewBox="0 0 12 12"><path fill="currentColor" d="M10.5 2.5l-1-1-3.5 3.5-3.5-3.5-1 1 3.5 3.5-3.5 3.5 1 1 3.5-3.5 3.5 3.5 1-1-3.5-3.5z"/></svg>
            </button>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="title-group">
                    <div class="status-indicator"></div>
                    <h1>Anti-AFK Bot</h1>
                </div>
                <div class="header-actions">
                    <label class="toggle-switch" title="Always on Top">
                        <input type="checkbox" id="alwaysOnTop">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            
            <div class="controls">
                <div class="input-group">
                    <label for="keysInput">Keys to Press (press to add)</label>
                    <div class="key-tags-container" id="keyTagsContainer">
                        <div id="keyChips" class="key-chips"></div>
                        <input type="text" id="keysInput" placeholder="Press any key..." autocomplete="off">
                    </div>
                    <div class="input-hint">Focus and press keys to add. Click a key to remove.</div>
                </div>
                
                <div class="option-grid">
                    <label class="option-card" title="Randomize intervals">
                        <input type="checkbox" id="randomizeEnabled">
                        <span class="option-card-body">
                            <span class="option-card-toggle" aria-hidden="true"></span>
                            <span class="option-card-text">Randomize</span>
                        </span>
                    </label>

                    <label class="option-card" title="Micro cursor movements">
                        <input type="checkbox" id="microMovements">
                        <span class="option-card-body">
                            <span class="option-card-toggle" aria-hidden="true"></span>
                            <span class="option-card-text">Micro Cursor</span>
                        </span>
                    </label>

                    <label class="option-card" title="Random mouse clicks">
                        <input type="checkbox" id="randomClicks">
                        <span class="option-card-body">
                            <span class="option-card-toggle" aria-hidden="true"></span>
                            <span class="option-card-text">Random Clicks</span>
                        </span>
                    </label>

                    <button class="option-card option-card-button" id="advancedBtn" title="Advanced Settings">
                        <span class="option-card-body">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                            </svg>
                            <span class="option-card-text">Advanced</span>
                        </span>
                    </button>
                </div>
            </div>

            <!-- Modal for Advanced Settings -->
            <div class="modal-overlay" id="advancedModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Advanced Settings</h3>
                        <button class="modal-close" id="modalClose">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="input-row">
                            <div class="input-group half">
                                <label for="intervalMin">Min Interval (s)</label>
                                <input type="number" id="intervalMin" value="4.5" step="0.1" min="0.5">
                            </div>
                            <div class="input-group half">
                                <label for="intervalMax">Max Interval (s)</label>
                                <input type="number" id="intervalMax" value="7.0" step="0.1" min="0.5">
                            </div>
                        </div>
                        
                        <div class="input-row">
                            <div class="input-group half">
                                <label for="pressDurationMin">Min Press (ms)</label>
                                <input type="number" id="pressDurationMin" value="50" step="10" min="10">
                            </div>
                            <div class="input-group half">
                                <label for="pressDurationMax">Max Press (ms)</label>
                                <input type="number" id="pressDurationMax" value="150" step="10" min="10">
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="cursorMovePixels">Cursor Move Range (px)</label>
                            <input type="number" id="cursorMovePixels" value="15" step="1" min="1">
                        </div>
                        
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-modal-close" id="modalCloseBtn">Close</button>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="toggleBtn" class="btn btn-start">Start Bot</button>
            </div>

            <div id="timerContainer" class="timer-container" style="display: none;">
                <div class="progress-bg">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <div class="timer-info">
                    <span>Next press in:</span>
                    <span id="countdownText">0.0s</span>
                </div>
            </div>

            <div class="footer">
                <p id="statusText">Ready to start</p>
                <div id="statsContainer" class="stats-container" style="display: none;">
                    <span>Presses: <strong id="pressCount">0</strong></span>
                    <span>Active: <strong id="activeTime">0s</strong></span>
                </div>
            </div>
        </div>
    </div>
    <div id="resizer-r" class="resizer resizer-r"></div>
    <div id="resizer-b" class="resizer resizer-b"></div>
    <div id="resizer-rb" class="resizer resizer-rb"></div>
    <script src="countdown.js"></script>
    <script src="script.js"></script>
</body>
</html>
