name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install UPX
        shell: pwsh
        run: |
          choco install upx -y
          # Find the actual path to upx.exe
          $upxPath = (Get-Command upx).Source | Split-Path -Parent
          echo "UPX_DIR=$upxPath" >> $env:GITHUB_ENV

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm game_antiafk_bot.spec
        # Note: UPX path might vary depending on version installed by choco. 
        # Alternatively, build.py can be updated to search for it.
        # For now, let's use a more robust way in build.py or just call pyinstaller directly if path is tricky.

      - name: Get Version
        id: get_version
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build release notes
        shell: pwsh
        run: |
          python scripts/extract_release_notes.py "${{ steps.get_version.outputs.VERSION }}" dist/release-notes.md

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AntiAfkBot.exe
          body_path: dist/release-notes.md
          name: ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
